name: Deploy to IPFS

# Authenticated CARv1 upload straight to the Aleph CCN via the aleph-rs CLI —
# no public IPFS gateway, no DHT-propagation race. Single command:
# `aleph website deploy/update`. `aleph website show` selects deploy (first
# run, creates the `websites` entry + attaches the domain) vs update (every
# run after, bumps version + auto-re-points the domain).

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  WEBSITE_NAME: scheduler-dashboard
  DOMAIN: network.aleph.cloud
  # Owner of the STORE + `websites`/`domains` aggregates, and the wallet
  # whose credits pay for the pin. The signer (ALEPH_PRIVATE_KEY) is
  # authorized as a delegate in this address's `security` aggregate for
  # STORE + AGGREGATE keys [domains, websites] on the ALEPH-CLOUDSOLUTIONS
  # channel.
  OWNER: "0xB136a85c95a0ea573793AB9739c7dF8682B87fCa"
  # Delegated writes must land on the channel the owner's security aggregate
  # authorizes, or the CCN rejects them.
  CHANNEL: ALEPH-CLOUDSOLUTIONS
  ALEPH_CLI_VERSION: v0.10.3
  ALEPH_CLI_SHA256: 68eeae468344ae3a02fed2caa55e8fc1c4a7b07c9e9dd08bee0d6fd37a4349c8

jobs:
  deploy:
    name: Build & deploy to Aleph
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://scheduler.api.aleph.cloud

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -E '^export const CURRENT_VERSION' src/changelog.ts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install aleph-rs CLI
        run: |
          set -euo pipefail
          url="https://github.com/aleph-im/aleph-rs/releases/download/${ALEPH_CLI_VERSION}/aleph-cli-linux-x86_64"
          curl -fsSL "$url" -o /usr/local/bin/aleph
          echo "${ALEPH_CLI_SHA256}  /usr/local/bin/aleph" | sha256sum -c -
          chmod +x /usr/local/bin/aleph
          aleph --version

      - name: Deploy to Aleph
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          out=out
          [ -d "$out" ] || { echo "::error::build output $out not found"; exit 1; }

          # Load-balanced endpoint. If deploys start failing with
          # error_code 4 / add_car hangs, pin a verified-healthy node here
          # (see stasho-app deploy-frontend.yml for the incident history).
          CCN_URL=https://api.aleph.im

          # First run creates the `websites` entry (deploy, also attaches the
          # --domain); later runs bump it (update, auto-re-points domains).
          # `aleph website show` exits non-zero when the entry is absent.
          if aleph --ccn "$CCN_URL" website show "$WEBSITE_NAME" --address "$OWNER" --json >/dev/null 2>&1; then
            verb=update
          else
            verb=deploy
          fi
          echo "Running: aleph website $verb $WEBSITE_NAME on $CCN_URL"

          if [ "$verb" = deploy ]; then
            aleph --ccn "$CCN_URL" website deploy "$WEBSITE_NAME" "$out" \
              --payment-type credit \
              --domain "$DOMAIN" \
              --framework nextjs \
              --on-behalf-of "$OWNER" \
              --channel "$CHANNEL" \
              --chain eth \
              --json | tee result.json
          else
            aleph --ccn "$CCN_URL" website update "$WEBSITE_NAME" "$out" \
              --payment-type credit \
              --on-behalf-of "$OWNER" \
              --channel "$CHANNEL" \
              --chain eth \
              --json | tee result.json
          fi

          volume=$(jq -r '.volume_id // .new_volume_id // "?"' result.json)
          cid=$(jq -r '.ipfs_cid // ""' result.json)
          version=$(jq -r '.version // "?"' result.json)
          {
            echo "## Deployed to IPFS — $verb"
            echo ""
            echo "| Field | Value |"
            echo "|------|------|"
            echo "| Build version | \`v${BUILD_VERSION}\` |"
            echo "| Website version | \`$version\` |"
            echo "| Volume (STORE) | \`$volume\` |"
            [ -n "$cid" ] && echo "| IPFS CID | \`$cid\` |"
            echo "| Live URL | https://${DOMAIN} |"
          } >> "$GITHUB_STEP_SUMMARY"
